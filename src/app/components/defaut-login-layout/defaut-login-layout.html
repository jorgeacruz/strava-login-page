<main class="w-full h-screen flex flex-col items-center justify-center md:flex-row">
    <section class="w-full h-screen bg-primary text-white flex flex-col items-center justify-center p-6 lg:w-1/3 md:w-1/2 gap-3">
        
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQbhZ3a8sij6Y7RaAp4exbKlWnR1HlAMZGMFg&s" alt="Login Image" class="w-1/2" class="w-48"/>
        <h2 class="text-2xl font-bold">{{ title }}</h2>
        <p class="">{{ description}}</p>
        <ng-content></ng-content>
        
        <button class="bg-white p-2 w-md text-black rounded-sm hover:scale-105 duration-300 cursor-pointer" >{{ primaryBtnText}}</button>
        <span class="w-full h-0 border-1-white border"></span>

    <section class="w-full h-screen bg-white flex-col items-center justify-center hidden md:flex">
        <h1>Welcome Back!</h1>
        <img/>
    </section>
