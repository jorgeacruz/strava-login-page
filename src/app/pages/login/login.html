<app-defaut-login-layout

    title="Faça login na sua conta"
    description="Olá, Insira suas credenciais para acessar sua conta."
    primaryBtnText="Entrar"
    secondaryBtnText="Criar conta"
    (submit)="submit()"

>
    <form [formGroup]="loginForm" class="flex flex-col items-center justify-center ">
        <app-primary-input 
            formControlName="email"
            inputName="email"
            type="email"  
            placeholder="Digite seu email"
        ></app-primary-input>
        <app-primary-input 
            formControlName="password"
            inputName="password"
            type="password" 
            placeholder="Digite sua senha"
        ></app-primary-input>
    </form>
</app-defaut-login-layout>
